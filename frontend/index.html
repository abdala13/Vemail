<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vmail Realtime</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

<div class="max-w-4xl mx-auto p-6">

<div class="bg-slate-900 rounded-3xl p-8 mb-8">

<h1 class="text-4xl font-black mb-8">
Vmail Telegram Realtime
</h1>

<div class="bg-slate-950 border border-slate-800 rounded-2xl p-5 mb-6">
<div class="text-slate-400 mb-2">البريد الحالي:</div>

<div id="email"
class="text-indigo-400 text-xl font-mono break-all">
Loading...
</div>
</div>

<div class="flex flex-wrap gap-4">

<button onclick="createEmail()"
class="bg-indigo-600 hover:bg-indigo-700 px-6 py-4 rounded-2xl font-bold">
إنشاء بريد جديد
</button>

<button onclick="linkTelegram()"
class="bg-sky-500 hover:bg-sky-600 px-6 py-4 rounded-2xl font-bold">
ربط تلجرام
</button>

</div>

<div id="telegramBox"
class="hidden mt-6 bg-slate-950 border border-slate-800 rounded-2xl p-6">
</div>

</div>

<div class="bg-slate-900 rounded-3xl p-8">

<h2 class="text-3xl font-black mb-6">
الرسائل الواردة
</h2>

<div id="messages"></div>

</div>

</div>

<script>

const API = 'https://vemail-o12l.onrender.com';

async function createEmail() {

  const response = await fetch(
    API + '/api/create-email',
    {
      method: 'POST',
      credentials: 'include'
    }
  );

  const data = await response.json();

  document.getElementById('email').innerText = data.email;

  connectRealtime();
}

async function loadUser() {

  const response = await fetch(
    API + '/api/me',
    {
      credentials: 'include'
    }
  );

  const data = await response.json();

  if (data.logged) {
    document.getElementById('email').innerText = data.email;
    connectRealtime();
  }
}

async function linkTelegram() {

  const response = await fetch(
    API + '/api/telegram/link',
    {
      method: 'POST',
      credentials: 'include'
    }
  );

  const data = await response.json();

  const box = document.getElementById('telegramBox');

  box.classList.remove('hidden');

  box.innerHTML = `
    <div class="text-xl font-black mb-4">
    أرسل هذا الكود للبوت:
    </div>

    <div class="text-5xl font-black text-sky-400 mb-5">
    ${data.code}
    </div>

    <a href="${data.botUrl}"
    target="_blank"
    class="underline text-sky-400">
    فتح البوت
    </a>
  `;
}

function connectRealtime() {

  const source = new EventSource(
    API + '/api/stream',
    {
      withCredentials: true
    }
  );

  source.onmessage = (event) => {

    const data = JSON.parse(event.data);

    const div = document.createElement('div');

    div.className =
      'bg-slate-950 border border-slate-800 rounded-2xl p-5 mb-5';

    div.innerHTML = `
      <div class="text-indigo-400 font-bold mb-2 break-all">
      ${data.from.address}
      </div>

      <div class="text-2xl font-black mb-4">
      ${data.subject || 'No subject'}
      </div>

      <div class="text-slate-300 whitespace-pre-wrap break-words">
      ${data.text || ''}
      </div>
    `;

    document.getElementById('messages').prepend(div);
  };
}

loadUser();

</script>

</body>
</html>
