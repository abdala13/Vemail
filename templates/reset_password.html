{% extends 'base.html' %}
{% block content %}
<div class="card auth narrow">
  <p class="eyebrow">{{ _("Telegram verification") }}</p>
  <h1>{{ _("Set a new password") }}</h1>
  <p class="muted">We sent a reset code to Telegram for: <strong class="break">{{ email }}</strong></p>
  <form method="post" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Telegram code
      <input name="code" inputmode="numeric" placeholder="6-digit code" required>
    </label>
    <label>New password
      <div class="password-row"><input name="new_password" type="password" minlength="8" required autocomplete="new-password"><button type="button" class="eye">👁</button></div>
    </label>
    <label>Confirm new password
      <div class="password-row"><input name="confirm_password" type="password" minlength="8" required autocomplete="new-password"><button type="button" class="eye">👁</button></div>
    </label>
    {% if recaptcha_enabled %}<div class="captcha-wrap"><div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}"></div></div>{% endif %}
    <button class="btn primary full">{{ _("Update password") }}</button>
  </form>
</div>
{% endblock %}
